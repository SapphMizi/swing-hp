</h1><p data-ja="現在軽音楽部SWINGのOBOGの皆様を対象へはメーリングリストへ加入していただき、こちらからライブや合宿等のお知らせを配信しております。まだ加入されておられない方やメールアドレスの変更希望の方は➀入学年度②名前③パート・楽器④加入希望のメールアドレス　を本文にご記入の上、handai.swing.ob@gmail.comまでご連絡いただきますようお願い申し上げます。加入は強制ではございませんが、名簿登録も兼ねておりますので上記内容をメールにて送信していただけると幸いです。なお、いただいたメールアドレスは大阪大学軽音楽部SWINGに関する連絡の目的以外には使用せず、連絡はすべてBCC送信とし、個人情報の取り扱いにも十分注意した上での運営としています。" data-en="Current members of the SWING Light Music Club alumni group are invited to join our mailing list, where we distribute announcements about live performances, training camps, and other events. If you have not yet joined or wish to change your email address, please send an email to handai.swing.ob@gmail.comまでご連絡いただきますようお願い申し上げます with the following information in the body: ① Year of enrollment ② Full name ③ Part/Instrument ④ Desired email address for the mailing list. Please note: Email addresses provided will only be used for communications related to the Osaka University Light Music Club SWING. All communications are sent via BCC, and we take great care in handling personal information."></p></div></main>
